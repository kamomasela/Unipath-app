            <h2>What is APS and how is it calculated?</h2>
            <p>If you are a Grade 11 or Grade 12 student in South Africa planning to apply to university, you have probably come across the term <strong>APS</strong>. Understanding what it means — and how it is worked out — is one of the most important steps in planning your application.</p>

            <h3>What does APS stand for?</h3>
            <p>APS stands for <strong>Admission Point Score</strong>. It is a number that South African universities use to determine whether a student meets the minimum requirements to apply for a specific degree or diploma programme.</p>
            <p>Each programme at each university has its own minimum APS. If your APS meets or exceeds that minimum, you may be eligible to apply. Qualifying does not guarantee acceptance — universities also consider other factors — but your APS is always the starting point.</p>

            <h3>How is APS calculated?</h3>
            <p>Your APS is calculated by converting each of your subject percentage marks into a <strong>level</strong> between 1 and 7, and then adding those levels together.</p>
            <p>Here is how percentages map to levels:</p>
            <ul>
              <li><strong>80% – 100%</strong> → Level 7</li>
              <li><strong>70% – 79%</strong> → Level 6</li>
              <li><strong>60% – 69%</strong> → Level 5</li>
              <li><strong>50% – 59%</strong> → Level 4</li>
              <li><strong>40% – 49%</strong> → Level 3</li>
              <li><strong>30% – 39%</strong> → Level 2</li>
              <li><strong>0% – 29%</strong> → Level 1</li>
            </ul>

            <h3>A practical example</h3>
            <p>Suppose a student has the following marks:</p>
            <ul>
              <li>English Home Language: 68% → Level 5</li>
              <li>Mathematics: 74% → Level 6</li>
              <li>Life Sciences: 55% → Level 4</li>
              <li>Physical Sciences: 62% → Level 5</li>
              <li>Accounting: 71% → Level 6</li>
              <li>History: 48% → Level 3</li>
            </ul>
            <p>Adding those levels: 5 + 6 + 4 + 5 + 6 + 3 = <strong>29 APS</strong>.</p>

            <h3>What about Life Orientation?</h3>
            <div class="article-callout">Most universities exclude Life Orientation from the APS calculation entirely. Some count it at half its value. APSWise handles this automatically for each university.</div>

            <h3>Why does this matter?</h3>
            <p>Your APS determines which programmes you are eligible to apply for. A programme like BCom Accounting at a major university might require an APS of 30 or more, while a diploma in Business Management might require 24. Knowing your APS early helps you set realistic targets and focus on improving the right subjects.</p>
            <p>Use APSWise to instantly calculate your APS and see which programmes you qualify for across multiple South African universities.</p>

          title: "Public vs private universities in South Africa",

            <h2>Public vs private universities in South Africa</h2>
            <p>When choosing where to study, South African students often face a choice between <strong>public</strong> and <strong>private</strong> universities. Both have advantages, and the right choice depends on your goals, budget, and programme preferences.</p>

            <h3>Public universities</h3>
            <p>South Africa has <strong>26 public universities</strong> funded and regulated by the Department of Higher Education and Training (DHET). These include traditional universities, comprehensive universities, and universities of technology.</p>
            <p>Key features of public universities:</p>
            <ul>
              <li>Regulated tuition fees (generally lower than private institutions)</li>
              <li>Eligible for NSFAS funding for qualifying students</li>
              <li>Degrees and qualifications are registered on the NQF and widely recognised by employers</li>
              <li>Larger campuses with extensive facilities, libraries, and student services</li>
              <li>Use the APS system for admissions</li>
            </ul>
            <p>Well-known public universities include UCT, Wits, UP, Stellenbosch University, UKZN, UJ, and UNISA.</p>

            <h3>Private universities and colleges</h3>
            <p>Private higher education institutions (PHEIs) in South Africa are independently owned and funded primarily through student fees. They must be registered with the DHET and their qualifications must be accredited by the CHE.</p>
            <p>Key features of private institutions:</p>
            <ul>
              <li>Smaller class sizes and more flexible scheduling</li>
              <li>Tuition fees are generally higher</li>
              <li>Not eligible for NSFAS, but some offer payment plans or bursaries</li>
              <li>Many have strong industry partnerships for work-readiness</li>
              <li>Admission requirements may differ from the standard APS system</li>
            </ul>
            <p>Examples include Stadio, Rosebank College, Boston City Campus, IIE MSA, and Regenesys.</p>

            <h3>Which is better?</h3>
            <div class="article-callout">There is no universal answer. Public universities offer broader recognition and lower fees, while private institutions may offer smaller classes, more flexible entry, and career-focused programmes.</div>
            <p>Before choosing, research whether a specific institution's qualifications are accredited and recognised by the relevant professional body for your chosen career. For engineering, accounting, law, medicine, and other regulated professions, this is especially important.</p>
            <p>APSWise currently focuses on public university programmes, helping you find what you qualify for based on your APS and subject marks.</p>

            <h2>How to choose the right university programme</h2>
            <p>Choosing a university programme is one of the biggest decisions you will make as a young person. It affects your career path, your finances, and your daily life for the next three to four years. Here is a practical framework to help you choose wisely.</p>

            <h3>1. Start with your interests and strengths</h3>
            <p>Ask yourself: what subjects do you enjoy most? What activities make you lose track of time? Your interests are a strong signal of where you are likely to thrive. It is very difficult to sustain motivation through a demanding degree in a field you dislike.</p>
            <p>Also look at where your marks are consistently strong. A passion for a subject combined with genuine ability is a powerful foundation.</p>

            <h3>2. Research career outcomes</h3>
            <p>Before committing to a programme, investigate where it leads. Questions to ask:</p>
            <ul>
              <li>What jobs do graduates of this programme typically get?</li>
              <li>Is there demand for this profession in South Africa and globally?</li>
              <li>What is the average starting salary in this field?</li>
              <li>Does this programme require professional registration (e.g., SAICA for accountants, ECSA for engineers)?</li>
            </ul>

            <h3>3. Check entry requirements carefully</h3>
            <p>Each programme has specific requirements — not just a minimum APS, but often minimum marks in specific subjects. A programme in Engineering might require Mathematics at Level 5 (60%) or higher. A Health Sciences programme might require Physical Sciences and Life Sciences at specific levels.</p>
            <div class="article-callout">Use APSWise to check both your APS and your subject-specific eligibility for programmes at multiple universities at once.</div>

            <h3>4. Consider the university's reputation in your field</h3>
            <p>Different universities are known for different strengths. UCT and Wits are known for medicine and engineering. Stellenbosch is strong in agriculture and engineering. UKZN has well-regarded health sciences programmes. Research which institutions have strong faculties and industry connections in your chosen field.</p>

            <h3>5. Think about finances</h3>
            <p>Check whether you qualify for NSFAS or a bursary. Some programmes — like teaching and nursing through the government bursary scheme — come with funding attached. Others may require you to self-fund or apply to private bursaries.</p>

            <h3>6. Do not rush — but do not delay</h3>
            <p>Application deadlines for South African universities typically fall between <strong>July and September</strong> of your Grade 12 year. Start researching in Grade 11 so you have time to make an informed decision rather than a rushed one.</p>
            <p>It is also worth knowing that changing your programme after first year is possible, but it can cost you time and money. Getting it right from the start matters.</p>

            <h2>What Mathematical Literacy means for university applications</h2>
            <p>One of the most important — and often misunderstood — subject choices a South African high school student makes is between <strong>Mathematics</strong> and <strong>Mathematical Literacy</strong>. This choice has a significant impact on which university programmes you can apply for.</p>

            <h3>What is the difference?</h3>
            <p><strong>Mathematics</strong> (often called "Pure Maths") covers abstract concepts including algebra, calculus, trigonometry, and statistics. It is designed to develop logical and analytical reasoning and is a prerequisite for many science, engineering, and commerce programmes.</p>
            <p><strong>Mathematical Literacy</strong> (often called "Maths Lit") applies mathematical skills to everyday real-life contexts — budgeting, measurements, data interpretation. It is designed to develop numeracy for general life situations rather than academic or technical study.</p>

            <h3>Why does it matter for university?</h3>
            <p>Many degree programmes at South African universities <strong>require Mathematics</strong>, not Mathematical Literacy, as a minimum subject requirement. This includes:</p>
            <ul>
              <li>All Engineering programmes</li>
              <li>BSc degrees (Sciences, Computer Science, Physics, etc.)</li>
              <li>BCom Accounting and related programmes at most universities</li>
              <li>Medicine, Pharmacy, and Health Sciences at most institutions</li>
              <li>Architecture and Built Environment programmes</li>
            </ul>

            <h3>What can you study with Mathematical Literacy?</h3>
            <p>Mathematical Literacy does not close all doors. There are still many programmes available, including:</p>
            <ul>
              <li>BA degrees in Humanities, Social Sciences, Law, and Languages</li>
              <li>Education (certain specialisations)</li>
              <li>Journalism and Media Studies</li>
              <li>Social Work</li>
              <li>Some Business and Management diplomas</li>
              <li>Tourism and Hospitality Management</li>
            </ul>

            <div class="article-callout">APSWise automatically checks your subject choices against programme requirements. If a programme requires Mathematics and you have Mathematical Literacy, it will show as not eligible — even if your APS is high enough.</div>

            <h3>Can you change from Maths Lit to Maths?</h3>
            <p>If you are still in Grade 10 or early Grade 11, switching is possible — but it is a significant step. Pure Maths requires a different level of abstract thinking and consistent practice. Speak to your school and consider getting extra support if you make the switch.</p>

            <h3>The bottom line</h3>
            <p>If you have any ambition to study in the sciences, engineering, health professions, or quantitative commerce fields, choosing Mathematics over Mathematical Literacy keeps far more doors open. If you are certain your path lies in humanities or the arts, Mathematical Literacy is a perfectly valid choice — just make sure you have confirmed it meets the requirements of your target programmes.</p>
          `
