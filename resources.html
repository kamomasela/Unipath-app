            <h2>What is APS and How is it Calculated?</h2>
            <p>If you are a Grade 11 or Grade 12 learner in South Africa, you have probably heard the term APS but may not fully understand what it means or how important it is for your future.</p>
            <p>APS stands for <strong>Admission Point Score</strong>. It is a number calculated from your Grade 12 final examination results and is used by South African universities to determine whether you qualify for a specific degree or diploma programme.</p>

            <h3>How is APS Calculated?</h3>
            <p>Each subject you write in Grade 12 is given a point value based on the percentage you achieve. Here is the official conversion table used by most South African universities:</p>
            <ul>
              <li><strong>80% to 100%</strong> = 7 points</li>
              <li><strong>70% to 79%</strong> = 6 points</li>
              <li><strong>60% to 69%</strong> = 5 points</li>
              <li><strong>50% to 59%</strong> = 4 points</li>
              <li><strong>40% to 49%</strong> = 3 points</li>
              <li><strong>30% to 39%</strong> = 2 points</li>
              <li><strong>0% to 29%</strong> = 1 point</li>
            </ul>
            <p>You then add up all your subject points to get your total APS score.</p>

            <h3>Example Calculation</h3>
            <ul>
              <li>English Home Language 65% = 5 points</li>
              <li>Mathematics 58% = 4 points</li>
              <li>Life Orientation 72% = 6 points</li>
              <li>History 61% = 5 points</li>
              <li>Business Studies 69% = 5 points</li>
              <li>Geography 63% = 5 points</li>
            </ul>
            <p><strong>Total APS = 30 points</strong></p>

            <h3>Does Life Orientation Count?</h3>
            <p>This depends on the university. Some universities include Life Orientation in the APS calculation while others exclude it or count it as half a subject. Always check the specific university requirements before applying.</p>

            <h3>Does Every University Use the Same APS?</h3>
            <p>No. Different universities calculate APS differently. Some universities have their own unique points systems. For example the University of Johannesburg has different APS requirements depending on whether you studied Pure Mathematics, Mathematical Literacy or Technical Mathematics.</p>
            <div class="article-callout">This is why APSWise calculates your APS score separately for each university — so you always see the most accurate result for each institution.</div>

            <h3>Why Does APS Matter?</h3>
            <p>Your APS score determines which university programmes you qualify for. A higher APS score opens up more options while a lower score may limit your choices. However it is important to know that a lower APS score does not mean you cannot go to university — it simply means you may need to look at different programmes or institutions.</p>

            <h2>Public vs Private Universities in South Africa</h2>
            <p>When choosing where to study after matric many South African learners focus only on public universities. However private universities are a fantastic option that many learners overlook. Understanding the difference between the two can help you make a better decision about your future.</p>

            <h3>What are Public Universities?</h3>
            <p>Public universities in South Africa are funded by the government and are regulated by the Department of Higher Education and Training. There are 26 public universities in South Africa including well known institutions such as:</p>
            <ul>
              <li>University of Johannesburg (UJ)</li>
              <li>University of Cape Town (UCT)</li>
              <li>University of Pretoria (UP)</li>
              <li>University of the Western Cape (UWC)</li>
              <li>University of KwaZulu-Natal (UKZN)</li>
              <li>Stellenbosch University (SU)</li>
              <li>University of the Witwatersrand (Wits)</li>
            </ul>
            <p>Public universities generally use the APS scoring system to determine admission.</p>

            <h3>What are Private Universities?</h3>
            <p>Private universities are independently owned and funded. They are also regulated and accredited but operate differently from public institutions. Popular private universities in South Africa include:</p>
            <ul>
              <li>Eduvos</li>
              <li>Rosebank College (IIE)</li>
              <li>Emeris (IIE Varsity College)</li>

            <h3>Admission Requirements</h3>
            <p>Public universities use the APS score as their primary admission requirement along with specific subject requirements.</p>
            <p>Private universities generally do not use APS scores. Instead they look at your NSC pass type which is determined by your matric results:</p>

            <h2>How to Choose the Right University Programme</h2>
            <p>Choosing the right university programme is one of the most important decisions you will ever make. It can feel overwhelming but breaking it down into simple steps makes it much easier.</p>

            <h3>Step 1 — Know Your Strengths</h3>
            <p>Start by thinking about which subjects you enjoy most and perform best in. Your matric subjects are a good indicator of where your strengths lie. If you love numbers consider programmes in accounting, engineering or finance. If you love people and communication consider psychology, education or business management.</p>

            <h3>Step 2 — Think About Your Career Goals</h3>
            <p>Ask yourself what kind of work you want to do every day. Research the careers that interest you and find out which university programmes lead to those careers. Do not just choose a programme because your friends are doing it or because it sounds impressive.</p>

            <h3>Step 3 — Know Your APS Score</h3>
            <p>Your APS score determines which programmes you are eligible for. There is no point falling in love with a programme you do not qualify for yet. Use APSWise to calculate your APS score and see exactly which programmes are available to you.</p>

            <h3>Step 4 — Research Your Options</h3>
            <p>Once you know what you qualify for research the programmes in detail. Look at what subjects are covered, how long the programme takes, what careers it leads to and what the fees are. Visit university websites and open days where possible.</p>

            <h3>Step 5 — Consider All Universities</h3>
            <p>Do not limit yourself to only the most famous universities. South Africa has excellent public and private universities that offer quality programmes. A programme that matches your passion at a smaller institution is far better than a mismatched programme at a prestigious one.</p>

            <h2>What Mathematical Literacy Means for University Applications</h2>
            <p>One of the most common questions South African Grade 12 learners ask is whether Mathematical Literacy will limit their university options. The honest answer is that it depends on the programme and the university — but it does not mean you cannot go to university.</p>

            <h3>The Three Maths Subjects in South Africa</h3>
            <p>South African learners in Grade 10 to 12 can choose from three mathematics subjects:</p>
            <ul>
              <li><strong>Pure Mathematics</strong> — the traditional maths subject covering algebra, calculus, trigonometry and statistics. Required for most science, engineering and technology programmes.</li>
              <li><strong>Mathematical Literacy</strong> — a practical maths subject focused on real life applications of mathematics. Accepted by many universities for business, humanities and social science programmes.</li>
              <li><strong>Technical Mathematics</strong> — a maths subject focused on technical and vocational applications. Accepted by some universities and technical colleges for engineering and trade programmes.</li>
            </ul>

            <h3>What Can You Study with Maths Literacy?</h3>
            <p>Mathematical Literacy is accepted for a wide range of programmes including:</p>
            <ul>
              <li>Business Administration</li>
              <li>Human Resource Management</li>
              <li>Public Administration</li>
              <li>Social Work</li>
              <li>Education (certain streams)</li>
              <li>Tourism Management</li>
              <li>Hospitality Management</li>
              <li>Communication and Media Studies</li>
              <li>Psychology (at certain universities)</li>
              <li>Law (at certain universities)</li>
            </ul>

            <h3>What Cannot You Study with Maths Literacy?</h3>
            <p>Mathematical Literacy is generally not accepted for:</p>
            <ul>
              <li>Engineering degrees</li>
              <li>Pure Science degrees (Physics, Chemistry)</li>
              <li>Actuarial Science</li>
              <li>Computer Science (at most universities)</li>
              <li>Architecture</li>
              <li>Medicine and most Health Sciences</li>
            </ul>

            <h3>Does APS Change with Maths Literacy?</h3>
            <p>Yes. Most universities have different APS requirements depending on whether you studied Pure Mathematics, Mathematical Literacy or Technical Mathematics. Usually the APS requirement is higher for Mathematical Literacy learners applying to the same programme as a Pure Mathematics learner.</p>
            <div class="article-callout">APSWise automatically detects which maths subject you studied and applies the correct APS requirement for each university and programme. This means you always see accurate results regardless of which maths subject you chose.</div>
