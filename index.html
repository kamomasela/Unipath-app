<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b4f6c" />
    <title>UniPath APS Checker</title>
    <link rel="manifest" href="./manifest.webmanifest?v=__BUILD_VERSION__" />
    <link rel="stylesheet" href="./styles.css?v=__BUILD_VERSION__" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <div class="hero-top">
          <h1>UniPath</h1>
          <a href="./about.html" class="info-btn" aria-label="About UniPath">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
              <path d="M12 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="12" cy="7.5" r="1" fill="currentColor"/>
            </svg>
          </a>
        </div>
        <p>APS and course eligibility checker for South African universities</p>
        <p><a href="./review.html">Open Rules Review</a></p>
      </header>

      <section class="card">
        <h2>Learner Input</h2>
        <form id="aps-form">
          <label class="label" for="grade-source">What results are you applying with?</label>
          <select id="grade-source" name="gradeSource">
            <option value="grade11_final">Grade 11 Final Results</option>
            <option value="grade12_midyear">Grade 12 Mid-Year (Term 2) Results</option>
          </select>
          <p id="grade-source-notice" class="hint"></p>

          <div id="subjects" class="subjects"></div>

          <button type="button" id="add-subject-btn" class="secondary">Add Subject</button>
          <button type="submit">Calculate APS</button>
          <button type="button" id="reset-all-btn" class="danger">Reset All</button>
        </form>
        <p class="hint">Tip: Enter percentages from your report (0-100).</p>
      </section>

      <section class="card">
        <div class="results-header">
          <h2>Results</h2>
          <button type="button" id="save-pdf-btn" class="secondary pdf-btn" style="display:none" aria-label="Save results as PDF">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M12 16l-4-4h2.5V4h3v8H16l-4 4z" fill="currentColor"/>
              <path d="M20 18H4v2h16v-2z" fill="currentColor"/>
            </svg>
            Save as PDF
          </button>
        </div>
        <p class="hint">Mode: Qualify only (NOT_ELIGIBLE hidden)</p>
        <div id="errors" class="errors" aria-live="polite"></div>
        <div id="confidence-notice" class="hint"></div>
        <div id="improvement-model" class="small"></div>
        <div id="results"></div>
        <div id="debug-results" class="small"></div>
      </section>
    </main>

    <template id="subject-row-template">
      <div class="subject-row">
        <input class="subject-search" type="text" placeholder="Search subject" aria-label="Search subject" />
        <select class="subject-select" aria-label="Subject"></select>
        <input class="mark-input" type="number" min="0" max="100" step="1" placeholder="Mark %" />
        <button type="button" class="remove-subject danger">Remove</button>
      </div>
    </template>

    <script>
      // Show the welcome screen every time the app is opened fresh.
      // sessionStorage clears when the tab/app is closed, so this fires on every new session.
      if (!sessionStorage.getItem("unipath_came_from_app")) {
        window.location.replace("./about.html");
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="./app.js?v=__BUILD_VERSION__"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          registrations.forEach((registration) => registration.unregister());
        });
      }
      if ("caches" in window) {
        caches.keys().then((keys) => {
          keys.forEach((key) => caches.delete(key));
        });
      }
    </script>
  </body>
</html>
